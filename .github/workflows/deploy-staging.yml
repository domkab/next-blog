  #         script: |
  #           set -euo pipefail

  #           # Figure out caddy user (caddy or www-data)
  #           CADDY_USER="$( (id -u caddy >/dev/null 2>&1 && echo caddy) || (id -u www-data >/dev/null 2>&1 && echo www-data) || echo caddy )"

  #           # Ensure ACL package
