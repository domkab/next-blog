  #           # Create tree (edit this for project-specific cases)
  #           sudo mkdir -p /var/www/pixeltech/uploads/{posts,featured-posts}

  #           # Base ownership & perms
  #           sudo chown -R deploy:deploy /var/www/pixeltech
  #           sudo chmod -R 755 /var/www/pixeltech

  #           # ACLs (existing files/dirs)
  #           sudo setfacl -R  \
  #             -m u:deploy:rwx \
  #             -m u:${CADDY_USER}:rx \
  #             /var/www/pixeltech

  #           # Default ACLs (inherit for NEW files/dirs)
  #           sudo setfacl -dR \
  #             -m u:deploy:rwx \
  #             -m u:${CADDY_USER}:rx \
  #             /var/www/pixeltech

  #           echo "== getfacl =="
  #           getfacl /var/www/pixeltech | sed -n '1,80p'

  # --- 2) Build in CI ---
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare upload folders
        run: |
          mkdir -p public/uploads/posts
          mkdir -p public/uploads/featured-posts

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DBNAME: ${{ secrets.MONGODB_DBNAME }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_USE_THEME: "${{ secrets.NEXT_PUBLIC_USE_THEME }}"
          NEXT_PUBLIC_CLIENT_SIDE_HEADER: "${{ secrets.NEXT_PUBLIC_CLIENT_SIDE_HEADER }}"
          NEXT_PUBLIC_CLIENT_SIDE_FOOTER: "${{ secrets.NEXT_PUBLIC_CLIENT_SIDE_FOOTER }}"

      - name: Debug build output
        run: |
          echo "📂 pwd: $(pwd)"
          find . -maxdepth 1 -type d | sort
          [ -d ./.next ] || (echo "❌ ./.next missing" && exit 1)
          [ -d ./public ] || (echo "❌ ./public missing" && exit 1)
          echo "✅ build artifacts present"

      - name: Pack artifact (exclude uploads)
        run: |
          tar -czf release.tgz \
            --exclude='public/uploads/**' \
            .next public package.json package-lock.json

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: pixeltech-release
          path: release.tgz
          if-no-files-found: error
          retention-days: 7

  # --- 3) Deploy & restart ---
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: pixeltech-release
          path: .

      - name: Ensure app dir exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /home/deploy/apps/pixeltech-staging

      - name: Upload tarball
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: release.tgz
          target: /home/deploy/apps/pixeltech-staging
          debug: true

      - name: Extract & restart (PM2)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            source ~/.profile || true
            source ~/.nvm/nvm.sh || true
            cd /home/deploy/apps/pixeltech-staging
            echo "📦 Extracting release.tgz"
            tar -xzf release.tgz
            rm -f release.tgz

            # remove old build artifacts (keep uploads, configs, public)
            find . -maxdepth 1 -type d -name ".next*" ! -path "./.next" -prune -exec rm -rf {} +

            echo "📜 public/uploads preserved:"
            ls -al public/uploads || echo "uploads missing (first deploy?)"

            # Install pm2 if missing, install prod deps, restart
            command -v pm2 >/dev/null 2>&1 || npm i -g pm2
            npm ci --omit=dev
            pm2 reload pixeltech-staging --update-env || pm2 start npm --name "pixeltech-staging" -- run start
            pm2 save
