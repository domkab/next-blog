  # push:
  #   branches: [staging]
  workflow_dispatch:

concurrency:
  group: next-blog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # --- 1) One-time / idempotent server prep (dirs, perms, ACLs) ---
